name: Deploy to DigitalOcean VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/root/proyecto-ti"
          exclude: ".git,.github,node_modules,venv"

      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/proyecto-ti
            
            # Setup Dashboard (Next.js)
            cd dashboard
            npm install
            npm run build
            pm2 restart nextjs-dashboard
            
            # Setup ETL & API (Python)
            cd ../server
            # Solo instala dependencias si es necesario (ya existe el venv)
            venv/bin/pip install -r requirements.txt
            pm2 restart fastapi-backend
            pm2 restart etl-engine
            
            # Save PM2 state
            pm2 save
